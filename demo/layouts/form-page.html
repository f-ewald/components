<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>form page template — @f-ewald/components</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: var(--ui-font, ui-sans-serif, system-ui, sans-serif);
      }
      .tpl-form {
        max-width: 40rem;
      }
      .tpl-row {
        display: grid;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
      }
      .tpl-row label {
        font-size: 0.75rem;
        font-weight: 500;
        color: #334155;
      }
      .tpl-row input,
      .tpl-row select {
        height: 2rem;
        padding: 0 0.5rem;
        border: 1px solid var(--ui-border, #e2e8f0);
        border-radius: var(--ui-radius-sm, 0.25rem);
        font: inherit;
      }
      .tpl-status {
        margin-top: 0.75rem;
        font-size: 0.875rem;
        color: #16a34a;
      }
    </style>
  </head>
  <body>
    <app-shell data-testid="tpl-shell" style="height: 100vh">
      <app-sidebar slot="sidebar" data-testid="tpl-sidebar">
        <div slot="header" style="display: flex; align-items: center; gap: 0.5rem;">
          <a href="../../index.html" aria-label="Back to catalog" style="display: inline-flex; flex: 0 0 auto;"><svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><rect width="24" height="24" rx="6" fill="#4f46e5"></rect><path d="M7 16.5 12 7l5 9.5M9.2 13h5.6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></a>
          <span style="display: var(--app-sidebar-label, inline); font-weight: 600;">Acme Admin</span>
        </div>
        <p>Workspace</p>
        <a href="#members" aria-current="page" aria-label="Members"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"/></svg><span style="display: var(--app-sidebar-label, inline)">Members</span></a>
        <a href="#schedule" aria-label="Schedule"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5"/></svg><span style="display: var(--app-sidebar-label, inline)">Schedule</span></a>
      </app-sidebar>

      <page-header slot="topbar" heading="Invite member">
        <nav slot="breadcrumb" aria-label="Breadcrumb">Members / Invite</nav>
      </page-header>

      <form class="tpl-form" data-tpl-form data-testid="tpl-form">
        <frame-box label="Details">
          <div class="tpl-row">
            <label for="tpl-name">Name</label>
            <input id="tpl-name" name="name" type="text" placeholder="Jane Doe" />
          </div>
          <div class="tpl-row">
            <label for="tpl-email">Email</label>
            <input id="tpl-email" name="email" type="email" placeholder="jane@acme.test" />
          </div>
        </frame-box>

        <div style="height: 1rem;"></div>

        <frame-box label="Role">
          <div class="tpl-row">
            <label for="tpl-role">Access level</label>
            <select id="tpl-role" name="role">
              <option>Viewer</option>
              <option>Editor</option>
              <option>Admin</option>
            </select>
          </div>
        </frame-box>

        <div style="height: 1rem;"></div>

        <form-actions data-testid="tpl-form-actions">
          <ui-button slot="secondary" variant="secondary" href="./list-only.html">Cancel</ui-button>
          <ui-button slot="primary" type="submit" variant="primary">Send invite</ui-button>
        </form-actions>

        <p class="tpl-status" data-tpl-form-status data-testid="tpl-form-status" role="status"></p>
      </form>
    </app-shell>

    <script type="module" src="./layouts.ts"></script>
  </body>
</html>
